server.port=${PORT:8090}
server.servlet.context-path=/api
 
# MySQL Datasource dynamically configured for Aiven Cloud
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&trustServerCertificate=true&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
 
# Hibernate / JPA (Works perfectly with Aiven MySQL)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
 
# JWT & Security Configuration
app.jwt.secret=${JWT_SECRET:FeedbackHub2024SecretKeyForJWTMustBe32CharLong!}
app.jwt.expiration=86400000
 
# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB